services:
  nginx-rtmp:
    image: tiangolo/nginx-rtmp
    container_name: rtmp-server
    ports:
      - "1935:1935" # RTMP port
      - "8080:8080" # HTTP port (for stats/web)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./stat.xsl:/var/www/html/rtmp/stat.xsl:ro
    restart: unless-stopped